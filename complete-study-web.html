<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAT 학습 플랫폼 - Split View</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* PDF Viewer Section (Left) */
        .pdf-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-right: 2px solid #ddd;
            overflow: hidden;
        }

        .pdf-header {
            padding: 15px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .pdf-viewer {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .pdf-viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .pdf-placeholder {
            text-align: center;
            color: #999;
            padding: 40px;
        }

        /* Question Section (Right) */
        .question-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }

        .filters-panel {
            padding: 15px;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            max-height: 120px;
            overflow-y: auto;
        }

        .filter-group {
            margin-bottom: 10px;
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .filter-btn:hover {
            border-color: #999;
        }

        .question-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .question-info {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .question-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #333;
            font-weight: 500;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .choice:hover {
            border-color: #999;
            background: #f9f9f9;
        }

        .choice.selected {
            background: #e8f5e9;
            border-color: #4CAF50;
        }

        .choice.correct {
            background: #c8e6c9;
            border-color: #2e7d32;
            color: #1b5e20;
        }

        .choice.incorrect {
            background: #ffcdd2;
            border-color: #c62828;
            color: #b71c1c;
        }

        .choice-label {
            font-weight: 600;
            margin-right: 10px;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: 500;
            text-align: center;
        }

        .feedback.correct {
            background: #c8e6c9;
            color: #1b5e20;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #b71c1c;
        }

        .stats {
            padding: 15px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            font-size: 13px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-value {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .stat-label {
            color: #666;
            font-size: 11px;
        }

        .navigation {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #f9f9f9;
            border-top: 1px solid #ddd;
        }

        .nav-btn {
            padding: 8px 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            flex: 1;
        }

        .nav-btn:hover {
            background: #45a049;
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .question-counter {
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #ddd;
        }

        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }

            .pdf-section {
                flex: 0 0 40%;
                border-right: none;
                border-bottom: 2px solid #ddd;
            }

            .question-section {
                flex: 1;
                overflow: hidden;
            }

            .filters-panel {
                max-height: 100px;
            }
        }

        .no-pdf-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- PDF Viewer (Left) -->
        <div class="pdf-section">
            <div class="pdf-header">📄 PDF 원문 (수식 포함)</div>
            <div class="pdf-viewer">
                <div class="pdf-placeholder" id="pdfPlaceholder">
                    <div class="no-pdf-message">
                        <span>PDF를 표시하는 중...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Question & Answers (Right) -->
        <div class="question-section">
            <!-- Filters -->
            <div class="filters-panel">
                <div class="filter-group">
                    <label class="filter-label">시험</label>
                    <div class="filter-buttons" id="testFilters"></div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">도메인</label>
                    <div class="filter-buttons" id="domainFilters"></div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">스킬</label>
                    <div class="filter-buttons" id="skillFilters"></div>
                </div>
            </div>

            <!-- Question Content -->
            <div class="question-content">
                <div class="question-info" id="questionInfo"></div>
                <div class="question-text" id="questionText"></div>
                <div class="choices" id="choices"></div>
                <div id="feedback"></div>
            </div>

            <!-- Stats -->
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">전체 문제</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="solvedCount">0</div>
                    <div class="stat-label">풀이</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">정답율</div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="navigation">
                <button class="nav-btn" id="prevBtn" onclick="previousQuestion()">← 이전</button>
                <button class="nav-btn" id="nextBtn" onclick="nextQuestion()">다음 →</button>
            </div>

            <!-- Question Counter -->
            <div class="question-counter" id="questionCounter"></div>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let filteredQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let filters = {
            test: null,
            domain: null,
            skill: null
        };

        // Load data
        async function loadData() {
            try {
                const response = await fetch('./data/questions-with-pdf.json');
                allQuestions = await response.json();
                filteredQuestions = [...allQuestions];
                userAnswers = JSON.parse(localStorage.getItem('satAnswers') || '{}');
                
                initializeFilters();
                renderQuestion();
                updateStats();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('questionText').textContent = '데이터를 로드할 수 없습니다.';
            }
        }

        function initializeFilters() {
            const tests = [...new Set(allQuestions.map(q => q.test))].sort();
            const domains = [...new Set(allQuestions.map(q => q.domain))].sort();
            const skills = [...new Set(allQuestions.map(q => q.skill))].sort();

            renderFilterButtons('testFilters', tests, 'test');
            renderFilterButtons('domainFilters', domains, 'domain');
            renderFilterButtons('skillFilters', skills, 'skill');
        }

        function renderFilterButtons(containerId, items, filterType) {
            const container = document.getElementById(containerId);
            container.innerHTML = items.map(item => `
                <button class="filter-btn" onclick="setFilter('${filterType}', '${item.replace(/'/g, "\\'")}')">
                    ${item}
                </button>
            `).join('');
        }

        function setFilter(filterType, value) {
            if (filters[filterType] === value) {
                filters[filterType] = null;
            } else {
                filters[filterType] = value;
            }
            
            applyFilters();
            updateFilterButtons();
            currentIndex = 0;
            renderQuestion();
        }

        function updateFilterButtons() {
            Object.keys(filters).forEach(filterType => {
                const buttons = document.querySelectorAll(`#${filterType}Filters .filter-btn`);
                buttons.forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.textContent.trim() === filters[filterType]) {
                        btn.classList.add('active');
                    }
                });
            });
        }

        function applyFilters() {
            filteredQuestions = allQuestions.filter(q => {
                if (filters.test && q.test !== filters.test) return false;
                if (filters.domain && q.domain !== filters.domain) return false;
                if (filters.skill && q.skill !== filters.skill) return false;
                return true;
            });
        }

        function renderQuestion() {
            if (filteredQuestions.length === 0) {
                document.getElementById('questionText').textContent = '해당하는 문제가 없습니다.';
                document.getElementById('questionInfo').textContent = '';
                document.getElementById('choices').innerHTML = '';
                document.getElementById('feedback').innerHTML = '';
                document.getElementById('pdfPlaceholder').innerHTML = '<div class="no-pdf-message">PDF가 없습니다.</div>';
                return;
            }

            const question = filteredQuestions[currentIndex];
            
            // Update info
            document.getElementById('questionInfo').innerHTML = `
                <strong>${question.test}</strong> | ${question.domain} | ${question.skill}
            `;

            // Update question text
            document.getElementById('questionText').textContent = question.question;

            // Update choices
            renderChoices(question);

            // Update PDF viewer
            updatePdfViewer(question);

            // Update counter
            document.getElementById('questionCounter').textContent = 
                `${currentIndex + 1} / ${filteredQuestions.length}`;

            // Update navigation buttons
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === filteredQuestions.length - 1;
        }

        function renderChoices(question) {
            const choicesContainer = document.getElementById('choices');
            choicesContainer.innerHTML = '';

            const choiceLabels = ['A', 'B', 'C', 'D'];
            const userAnswer = userAnswers[question.id];
            const isAnswered = userAnswer !== undefined;

            choiceLabels.forEach(label => {
                const choice = document.createElement('div');
                choice.className = 'choice';
                
                if (isAnswered) {
                    if (label === userAnswer) {
                        choice.classList.add(userAnswer === question.correctAnswer ? 'correct' : 'incorrect');
                    } else if (label === question.correctAnswer) {
                        choice.classList.add('correct');
                    }
                } else if (label === userAnswer) {
                    choice.classList.add('selected');
                }

                choice.innerHTML = `<span class="choice-label">${label}.</span> ${question.choices[label]}`;
                choice.onclick = () => selectAnswer(question, label);
                choicesContainer.appendChild(choice);
            });

            // Show feedback
            renderFeedback(question, isAnswered, userAnswer);
        }

        function renderFeedback(question, isAnswered, userAnswer) {
            const feedbackContainer = document.getElementById('feedback');
            feedbackContainer.innerHTML = '';

            if (isAnswered) {
                const isCorrect = userAnswer === question.correctAnswer;
                const feedback = document.createElement('div');
                feedback.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
                feedback.textContent = isCorrect ? '✓ 정답입니다!' : `✗ 틀렸습니다. 정답은 ${question.correctAnswer}입니다.`;
                feedbackContainer.appendChild(feedback);
            }
        }

        function selectAnswer(question, label) {
            const isAnswered = userAnswers[question.id] !== undefined;
            if (isAnswered) return;

            userAnswers[question.id] = label;
            localStorage.setItem('satAnswers', JSON.stringify(userAnswers));
            renderChoices(question);
            updateStats();
        }

        function updatePdfViewer(question) {
            const pdfPath = question.pdfPath;
            const placeholder = document.getElementById('pdfPlaceholder');
            
            if (pdfPath) {
                placeholder.innerHTML = `<iframe src="${pdfPath}" type="application/pdf"></iframe>`;
            } else {
                placeholder.innerHTML = '<div class="no-pdf-message">PDF를 찾을 수 없습니다.</div>';
            }
        }

        function updateStats() {
            const totalFiltered = filteredQuestions.length;
            const solvedFiltered = filteredQuestions.filter(q => userAnswers[q.id] !== undefined).length;
            const correctFiltered = filteredQuestions.filter(q => {
                const answer = userAnswers[q.id];
                return answer && answer === q.correctAnswer;
            }).length;
            const accuracyFiltered = solvedFiltered > 0 ? Math.round((correctFiltered / solvedFiltered) * 100) : 0;

            document.getElementById('totalCount').textContent = totalFiltered;
            document.getElementById('solvedCount').textContent = solvedFiltered;
            document.getElementById('accuracy').textContent = accuracyFiltered + '%';
        }

        function nextQuestion() {
            if (currentIndex < filteredQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        function previousQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
